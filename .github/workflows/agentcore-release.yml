name: AgentCore Pipeline
run-name: 'AgentCore Release - bootstrapper-agent by @${{ github.actor }}'

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: agentcore-terraform
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: eu-central-1
  TF_DIR: terraform

jobs:
  # --------------------------------------------------------------------------
  # Lint (Python + Terraform format)
  # --------------------------------------------------------------------------
  lint:
    name: Lint [Codebase]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check app/ mcp_servers/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

  # --------------------------------------------------------------------------
  # Terraform Validate + TFLint
  # --------------------------------------------------------------------------
  validate:
    name: Validate & Lint [Terraform]
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: TFLint Init
        working-directory: ${{ env.TF_DIR }}
        run: tflint --init

      - name: TFLint
        id: tflint
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}
        run: tflint --recursive --format compact 2>&1 | tee /tmp/tflint.txt

      - name: Comment TFLint on PR
        if: always() && github.event_name == 'pull_request'
        uses: awsbaku/github-actions/actions/upsert-pr-comment@main
        with:
          marker: agentcore-tflint
          title: TFLint
          status: ${{ steps.tflint.outcome }}
          file: /tmp/tflint.txt

      - name: Fail if TFLint failed
        if: steps.tflint.outcome == 'failure'
        run: exit 1

  # --------------------------------------------------------------------------
  # Security Scan (Trivy)
  # --------------------------------------------------------------------------
  security:
    name: Security Scan [Terraform]
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy IaC scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: ${{ env.TF_DIR }}
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore
          output: trivy_output.txt

      - name: Comment Trivy on PR
        if: always() && github.event_name == 'pull_request'
        uses: awsbaku/github-actions/actions/upsert-pr-comment@main
        with:
          marker: agentcore-trivy
          title: Trivy Security Scan
          status: ${{ steps.trivy.outcome }}
          file: trivy_output.txt
          fallback: No vulnerabilities found.

      - name: Fail if Trivy failed
        if: steps.trivy.outcome == 'failure'
        run: exit 1

  # --------------------------------------------------------------------------
  # Terraform Plan (on PR)
  # --------------------------------------------------------------------------
  plan:
    name: Plan [Terraform]
    if: github.event_name == 'pull_request'
    needs: [validate, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build packages
        run: |
          bash scripts/package.sh
          bash scripts/package_mcp.sh

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/plan.txt

      - name: Comment plan on PR
        if: always()
        uses: awsbaku/github-actions/actions/upsert-pr-comment@main
        with:
          marker: agentcore-plan
          title: Terraform Plan
          status: ${{ steps.plan.outcome }}
          format: hcl
          file: /tmp/plan.txt

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # --------------------------------------------------------------------------
  # Terraform Apply (on merge to main)
  # --------------------------------------------------------------------------
  deploy:
    name: Apply [Terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate, security]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve
